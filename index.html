<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新契約請款時效助手 v30</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <!-- Lucide Icons (Base & React Wrapper) -->
    <script src="https://unpkg.com/lucide@0.284.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.284.0/dist/umd/lucide-react.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F3F5F8;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        // 修正全域變數名稱為 LucideReact
        const { 
            ChevronRight, RefreshCcw, AlertCircle, CheckCircle2, 
            Clock, User, ArrowLeft, Landmark, Zap, 
            Info, MousePointer2, ShieldCheck, History, Calendar,
            ArrowRight, Timer, FileCheck2, Calculator, CheckSquare,
            Building2, Layers
        } = LucideReact;

        const App = () => {
            const [currentStep, setCurrentStep] = useState('HOME');
            const [history, setHistory] = useState([]);

            const STEPS = {
                HOME: {
                    id: "診斷起始",
                    question: "請選擇您的案件請款事由：",
                    options: [
                        { label: "受理請款「請款失敗」", next: "ACC_CHECK", color: "bg-blue-600", icon: <Landmark size={20}/> },
                        { label: "核保請款「請款失敗」", next: "UW_DECISION", color: "bg-indigo-600", icon: <Zap size={20}/> }
                    ]
                },
                ACC_CHECK: {
                    id: "核定狀態",
                    question: "查詢系統：保單核定完成了嗎？",
                    options: [
                        { label: "保單已核定完成", next: "ACC_DATE", color: "bg-blue-600", icon: <FileCheck2 size={20}/> },
                        { label: "保單尚未核定", next: "RES_ACC_WAIT", color: "bg-slate-500", icon: <Clock size={20}/> }
                    ]
                },
                ACC_DATE: {
                    id: "日期判定",
                    question: "請比對系統核定與失敗日期：",
                    options: [
                        { label: "核定日期 > 請款失敗日期", next: "MODE_CHECK_ACC", color: "bg-emerald-600", icon: <Calendar size={20}/> },
                        { label: "核定日期 <= 請款失敗日期", next: "RES_ACC_T3", color: "bg-amber-600", icon: <History size={20}/> }
                    ]
                },
                UW_DECISION: {
                    id: "處理行為",
                    question: "您現在要手動重新請款嗎？",
                    options: [
                        { label: "我要立即點選「重新請款」按鈕", next: "MODE_CHECK_UW_MANUAL", color: "bg-indigo-600", icon: <MousePointer2 size={20}/> },
                        { label: "依系統作業時間自動發動請款", next: "MODE_CHECK_UW_AUTO", color: "bg-slate-500", icon: <Timer size={20}/> }
                    ]
                },
                MODE_CHECK_ACC: { id: "模式判定", question: "本案符合即時扣款三項要件嗎？", options: [{ label: "符合即時扣款條件", next: "TIME_PICK_ACC", color: "bg-emerald-600", icon: <Zap size={20}/> }, { label: "一般扣款流程", next: "RES_GEN_T2", color: "bg-slate-600", icon: <Landmark size={20}/> }] },
                MODE_CHECK_UW_MANUAL: { id: "模式判定", question: "本案符合即時扣款三項要件嗎？", options: [{ label: "符合即時扣款條件", next: "TIME_PICK_UW", color: "bg-emerald-600", icon: <Zap size={20}/> }, { label: "一般扣款流程", next: "RES_GEN_T2", color: "bg-slate-600", icon: <Landmark size={20}/> }] },
                MODE_CHECK_UW_AUTO: { id: "模式判定", question: "本案符合即時扣款三項要件嗎？", options: [{ label: "符合即時扣款條件", next: "RES_AUTO_T3_INST", color: "bg-emerald-600", icon: <Zap size={20}/> }, { label: "一般扣款流程", next: "RES_AUTO_T3_GEN", color: "bg-slate-600", icon: <Landmark size={20}/> }] },
                
                TIME_PICK_ACC: {
                    id: "批次時間",
                    question: "審查部「重壓核定」的時間點？",
                    options: [
                        { label: "中午 12:00 之前完成操作", next: "RES_INST_1200", color: "bg-teal-500", icon: <Timer size={20}/> },
                        { label: "下午 15:30 之前完成操作", next: "RES_INST_1530", color: "bg-teal-600", icon: <Timer size={20}/> },
                        { label: "下午 15:30 之後完成操作", next: "RES_INST_NEXT", color: "bg-slate-500", icon: <Timer size={20}/> }
                    ]
                },
                TIME_PICK_UW: {
                    id: "批次時間",
                    question: "您「點擊重新請款」的時間點？",
                    options: [
                        { label: "中午 12:00 之前完成操作", next: "RES_INST_1200", color: "bg-teal-500", icon: <Timer size={20}/> },
                        { label: "下午 15:30 之前完成操作", next: "RES_INST_1530", color: "bg-teal-600", icon: <Timer size={20}/> },
                        { label: "下午 15:30 之後操作", next: "RES_INST_NEXT", color: "bg-slate-500", icon: <Timer size={20}/> }
                    ]
                }
            };

            const RESULTS = {
                RES_ACC_WAIT: {
                    title: "等待核定中",
                    badge: "進度暫停中",
                    desc: "保單目前尚未完成核定。請在保單核定完成後重新使用本系統，屆時將自動轉換為核保請款時效。",
                    icon: <Clock size={40} className="text-orange-500" />
                },
                RES_ACC_T3: {
                    title: "系統作業等待中",
                    badge: "T+3個工作日發動",
                    desc: "由於剛扣款失敗，系統將保留作業緩衝時間。預計於受理請款失敗後第 3 個工作天自動發動。若需提前作業，請聯繫審查部重新壓核定。",
                    icon: <RefreshCcw size={40} className="text-amber-500" />
                },
                RES_GEN_T2: {
                    title: "一般扣款時效預估",
                    badge: "2個工作日銀行回傳",
                    desc: "本案採一般流程發動請款。發動請款後需等待 2 個工作天處理資料，也就是後天即可在系統查看最終結果。",
                    icon: <Landmark size={40} className="text-slate-500" />
                },
                RES_INST_1200: {
                    title: "即時扣款時效預估",
                    badge: "今日 12:00 銀行回傳",
                    desc: "案件符合即時扣款條件。預計於今日中午 12:00 銀行就會回傳扣款結果，請提醒客戶確認帳戶餘額是否充足。",
                    icon: <Zap size={40} className="text-emerald-500" />
                },
                RES_INST_1530: {
                    title: "即時扣款時效預估",
                    badge: "今日 15:30 銀行回傳",
                    desc: "案件符合即時扣款條件。預計於今日下午 15:30 銀行就會回傳扣款結果，請提醒客戶確認帳戶餘額是否充足。",
                    icon: <Zap size={40} className="text-emerald-500" />
                },
                RES_INST_NEXT: {
                    title: "即時扣款時效預估",
                    badge: "次日 12:00 銀行回傳",
                    desc: "因已過今日即時扣款批次，系統排定於下一工作日中午 12:00 由銀行回傳最終扣款結果。",
                    icon: <History size={40} className="text-teal-600" />
                },
                RES_AUTO_T3_INST: {
                    title: "自動再扣時效 (即時)",
                    badge: "T+3個工作日銀行回傳",
                    desc: "【T=扣款失敗日】由系統自動發動扣款，預計於 3 個工作天後的中午 12:00 發動即時扣款，當日銀行即會回傳結果。",
                    icon: <RefreshCcw size={40} className="text-emerald-500" />
                },
                RES_AUTO_T3_GEN: {
                    title: "自動再扣時效 (一般)",
                    badge: "T+5個工作日銀行回傳",
                    desc: "【T=扣款失敗日】由系統自動發動扣款，預計將於 3 個工作天後發動一般流程，發動後需再過 2 個工作天等待銀行處理，總時效約 5 個工作天。",
                    icon: <Landmark size={40} className="text-slate-400" />
                }
            };

            const handleAction = (next) => {
                setHistory([...history, currentStep]);
                setCurrentStep(next);
            };

            const goBack = () => {
                const prev = history.pop();
                setHistory([...history]);
                setCurrentStep(prev || 'HOME');
            };

            const reset = () => {
                setHistory([]);
                setCurrentStep('HOME');
            };

            const stepData = STEPS[currentStep];
            const resultData = RESULTS[currentStep];

            return (
                <div className="min-h-screen bg-[#F3F5F8] font-sans text-slate-900 antialiased flex justify-center p-4 md:p-6">
                    <div className="w-full max-w-md bg-white min-h-[600px] shadow-2xl flex flex-col relative border-x border-slate-200/50 rounded-[2.5rem] overflow-hidden">
                        
                        {/* Header */}
                        <header className="bg-white border-b border-slate-100 px-6 py-5 sticky top-0 z-40 shadow-sm flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                {currentStep !== 'HOME' ? (
                                    <button onClick={goBack} className="p-2 -ml-2 hover:bg-slate-50 rounded-full transition-all active:scale-90">
                                        <ArrowLeft size={20} className="text-slate-600" />
                                    </button>
                                ) : (
                                    <div className="w-9 h-9 bg-indigo-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                                        <Calculator size={20} />
                                    </div>
                                )}
                                <div className="flex flex-col">
                                    <h1 className="font-black text-slate-800 tracking-tight text-[18px]">新契約請款時效助手</h1>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                                        <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest leading-none">發動扣款時間預估</span>
                                    </div>
                                </div>
                            </div>
                            <button onClick={reset} className="text-[11px] font-black text-slate-400 hover:text-indigo-600 transition-colors uppercase">
                                重新開始
                            </button>
                        </header>

                        {/* Progress Bar */}
                        {stepData && currentStep !== 'HOME' && (
                            <div className="bg-slate-50/50 px-6 py-2 border-b border-slate-100">
                                <div className="flex items-center justify-between gap-4">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter flex items-center gap-1">
                                        <Layers size={14} className="opacity-50"/> {stepData.id}
                                    </span>
                                    <div className="flex-1 h-1 bg-slate-200 rounded-full overflow-hidden">
                                        <div 
                                            className="h-full bg-indigo-600 transition-all duration-700 ease-out" 
                                            style={{width: `${(history.length / 5) * 100}%`}}
                                        ></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Main Content Area */}
                        <div className="flex-grow p-6 flex flex-col">
                            {stepData ? (
                                <div className="animate-fade-in">
                                    <h2 className="text-[23px] font-black text-slate-900 mb-8 leading-tight tracking-tight">
                                        {stepData.question}
                                    </h2>

                                    <div className="space-y-3">
                                        {stepData.options.map((opt, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => handleAction(opt.next)}
                                                className="w-full group flex items-center p-5 bg-white border border-slate-200 rounded-2xl hover:border-indigo-600 hover:bg-indigo-50/20 transition-all active:scale-[0.98] shadow-sm overflow-hidden text-left"
                                            >
                                                <div className={`mr-4 p-2.5 rounded-xl bg-slate-50 group-hover:bg-white transition-colors shadow-sm ${opt.color}`}>
                                                    {opt.icon}
                                                </div>
                                                <span className={`flex-1 font-bold text-[15px] whitespace-nowrap overflow-hidden text-ellipsis ${opt.color}`}>
                                                    {opt.label}
                                                </span>
                                                <ChevronRight size={16} className="text-slate-300 group-hover:text-indigo-600 transition-all" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : resultData ? (
                                <div className="animate-fade-in text-center">
                                    <div className="flex flex-col items-center mb-8">
                                        <div className="mb-8 p-8 bg-slate-50 rounded-[2.5rem] shadow-inner relative ring-1 ring-slate-100">
                                            {resultData.icon}
                                            <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 px-6 py-2.5 bg-indigo-700 rounded-full shadow-xl border-2 border-white whitespace-nowrap z-10">
                                                <p className="text-[10px] font-black text-white uppercase tracking-tighter leading-none">
                                                    {resultData.badge}
                                                </p>
                                            </div>
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-900 mb-4 mt-2 leading-tight">{resultData.title}</h2>
                                        <div className="bg-[#F1F5F9] p-8 rounded-[2rem] border border-slate-200 text-left shadow-sm">
                                            <p className="text-[16px] font-bold text-slate-700 leading-relaxed italic">
                                                {resultData.desc}
                                            </p>
                                        </div>
                                    </div>

                                    <button onClick={reset} className="w-full bg-slate-900 text-white py-6 rounded-[1.5rem] font-black text-lg hover:bg-black transition-all shadow-xl active:scale-95 flex items-center justify-center gap-3">
                                        <RefreshCcw size={20}/> 診斷其他新案件
                                    </button>
                                </div>
                            ) : null}
                        </div>

                        {/* Footer Wall */}
                        <footer className="mt-auto border-t border-slate-100 bg-white p-6 pb-8 text-left">
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100/50">
                                    <div className="flex items-center gap-1.5 mb-2">
                                        <Timer size={14} className="text-slate-400"/>
                                        <p className="text-[9px] font-black text-slate-500 uppercase tracking-tighter leading-none">即時扣款回傳批次</p>
                                    </div>
                                    <div className="space-y-1.5 text-[11px] font-bold text-slate-600">
                                        <div className="flex justify-between"><span>12:00前操作</span><span className="text-indigo-600 font-bold">中午</span></div>
                                        <div className="flex justify-between"><span>15:30前操作</span><span className="text-indigo-600 font-bold">下午</span></div>
                                    </div>
                                </div>
                                <div className="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100/30 shadow-inner">
                                    <div className="flex items-center gap-1.5 mb-2">
                                        <ShieldCheck size={14} className="text-indigo-500"/>
                                        <p className="text-[9px] font-black text-indigo-500 uppercase tracking-tighter leading-none">即時扣款三要件</p>
                                    </div>
                                    <div className="space-y-1 text-[10px] font-black text-indigo-700/80 leading-none">
                                        <div className="flex items-center gap-1.5"><CheckSquare size={12} className="text-indigo-400 opacity-60"/> 台幣案件專屬</div>
                                        <div className="flex items-center gap-1.5"><CheckSquare size={12} className="text-indigo-400 opacity-60"/> 26 家適用行庫</div>
                                        <div className="flex items-center gap-1.5"><CheckSquare size={12} className="text-indigo-400 opacity-60"/> eDDA/網銀雙因</div>
                                    </div>
                                </div>
                            </div>
                            <p className="text-[10px] font-black text-slate-300 tracking-[0.3em] uppercase text-center flex items-center justify-center gap-2">
                                <Building2 size={12}/> 核心作業邏輯校準版 v30
                            </p>
                        </footer>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
