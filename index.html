
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新契約請款智慧助手 v46</title>
    <!-- 基礎佈局與渲染引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .app-shell {
            width: 100%;
            max-width: 900px; 
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .force-nowrap {
            white-space: nowrap !important;
            word-break: keep-all !important;
            overflow: visible !important;
        }

        .animate-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-active:active { transform: scale(0.99); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const BANK_DATABASE = [
            {"code": "004", "name": "台灣銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "005", "name": "土地銀行", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},
            {"code": "006", "name": "合作金庫", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},

            {"code": "008", "name": "華南銀行", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},
            {"code": "009", "name": "彰化銀行", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},
            {"code": "011", "name": "上海銀行", "isInstant": true, "twdDaily": false, "foreignDaily": true, "twdNinth": true, "foreignNinth": false},
            {"code": "012", "name": "台北富邦", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "013", "name": "國泰世華", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},
            {"code": "016", "name": "高雄銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "017", "name": "兆豐銀行", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},

            {"code": "052", "name": "渣打銀行", "isInstant": false, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "053", "name": "台中商銀", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "054", "name": "京城銀行", "isInstant": false, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "101", "name": "瑞興銀行", "isInstant": false, "twdDaily": false, "twdNinth": true},
            {"code": "081", "name": "匯豐銀行", "isInstant": false, "twdDaily": true, "twdNinth": false},
            {"code": "102", "name": "華泰銀行", "isInstant": false, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "103", "name": "新光銀行", "isInstant": true, "twdDaily": true, "twdNinth": false},
            {"code": "108", "name": "陽信銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "118", "name": "板信商銀", "isInstant": false, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "147", "name": "三信商銀", "isInstant": false, "twdDaily": true, "twdNinth": false},
            {"code": "700", "name": "郵局", "isInstant": false, "twdDaily": true, "twdNinth": false},
            {"code": "803", "name": "聯邦銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "805", "name": "遠東銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "806", "name": "元大銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "807", "name": "永豐銀行", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},
            {"code": "808", "name": "玉山銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "809", "name": "凱基銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "810", "name": "星展銀行", "isInstant": true, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "812", "name": "台新銀行", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false},
            {"code": "816", "name": "安泰銀行", "isInstant": false, "twdDaily": false, "foreignDaily": false, "twdNinth": true, "foreignNinth": true},
            {"code": "823", "name": "將來銀行", "isInstant": true, "twdDaily": true, "twdNinth": false},
            {"code": "ACH", "name": "農漁會/信用合作社", "isInstant": false, "twdDaily": true, "twdNinth": false},
            {"code": "822", "name": "中國信託", "isInstant": true, "twdDaily": true, "foreignDaily": true, "twdNinth": false, "foreignNinth": false}
        ];

        const SvgIcon = ({ name, className = "w-3.5 h-3.5", color = "currentColor" }) => {
            const paths = {
                home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />,
                search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></>,
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>,
                landmark: <><path d="M3 22h18" /><path d="M6 18v-7" /><path d="M11 18v-7" /><path d="M16 18v-7" /><path d="M3 11l9-8 9 8" /></>,
                arrowLeft: <path d="M19 12H5M12 19l-7-7 7-7" />,
                chevronRight: <path d="M9 18l6-6-6-6" />,
                chevronDown: <path d="m6 9 6 6 6-6" />,
                success: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                world: <><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                history: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /></>,
                help: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>
            };
            return (
                <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    {paths[name] || <circle cx="12" cy="12" r="10" stroke="#ccc" />}
                </svg>
            );
        };

        const App = () => {
            const [currentStep, setCurrentStep] = useState('HOME');
            const [history, setHistory] = useState([]);
            const [params, setParams] = useState({ currency: '', auth: '', isAuto: false });
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedFaq, setExpandedFaq] = useState(null);

            // --- 導引流程邏輯 ---
            const STEPS = {
                HOME: { id: "診斷起始", question: "請選擇您的案件目前請款事由：", options: [
                    { label: "受理請款「請款失敗」", next: "ACC_CHECK", color: "bg-blue-600", icon: "landmark" },
                    { label: "核保請款「請款失敗」", next: "UW_DECISION", color: "bg-indigo-600", icon: "zap" }
                ]},
                ACC_CHECK: { id: "核定狀態", question: "查詢系統：這件保單核定完成了嗎？", options: [
                    { label: "保單已核定完成", next: "ACC_DATE", color: "bg-blue-600", icon: "success" },
                    { label: "保單目前尚未核定", next: "RES_ACC_WAIT", color: "bg-slate-500", icon: "clock" }
                ]},
                ACC_DATE: { id: "日期判定", question: "請比對系統中的核定與請款失敗日期：", options: [
                    { label: "核定日期 > 請款失敗日期", next: "CURRENCY_PICK", color: "bg-emerald-600", icon: "calendar" },
                    { label: "核定日期 <= 請款失敗日期", next: "RES_ACC_T3", color: "bg-amber-600", icon: "history" }
                ]},
                UW_DECISION: { id: "處理行為", question: "業務員現在是否要手動申請重新請款？", options: [
                    { label: "是，業務員要自行點選重新請款", next: "CURRENCY_PICK", action: () => updateParams('isAuto', false), color: "bg-indigo-600", icon: "zap" },
                    { label: "否，依系統作業時間自動發動請款", next: "CURRENCY_PICK", action: () => updateParams('isAuto', true), color: "bg-slate-500", icon: "clock" }
                ]},
                CURRENCY_PICK: { id: "幣別判定", question: "請選擇扣款幣別：", options: [
                    { label: "台幣扣款", next: "AUTH_METHOD", action: () => updateParams('currency', 'TWD'), color: "bg-emerald-600", icon: "landmark" },
                    { label: "外幣扣款", next: "BANK_SEARCH", action: () => updateParams('currency', 'FOREIGN'), color: "bg-orange-500", icon: "world" }
                ]},
                AUTH_METHOD: { id: "授權方式", question: "授權方式是否為 eDDA 或 網銀雙因？", options: [
                    { label: "是 (eDDA / 網銀雙因)", next: "BANK_SEARCH", action: () => updateParams('auth', 'EDDA'), color: "bg-indigo-600", icon: "zap" },
                    { label: "否 (紙本授權 / 國泰世華網銀直連)", next: "BANK_SEARCH", action: () => updateParams('auth', 'PAPER'), color: "bg-slate-500", icon: "calendar" }
                ]}
            };

            const RESULTS = {
                RES_ACC_WAIT: { title: "等待核定中", badge: "進度暫停", color: "text-amber-500", icon: "alert", desc: "保單目前尚未完成核定，需待保單核定後，系統會自動發動請款。請在保單核定後，再重新查詢。" },
                RES_ACC_T3: { title: "系統作業等待中", badge: "T+3個工作日發動", color: "text-amber-600", icon: "history", desc: "由於剛扣款失敗，系統將保留作業緩衝時間。預計於受理請款失敗日後第 3 個工作天自動發動請款作業（進行即時或一般扣款作業)。若需提前扣款，請聯繫審查部重新壓核定。" },
                MANUAL_INSTANT: { title: "即時扣款", badge: "依作業時間推算銀行回傳時間", color: "text-emerald-500", icon: "success", desc: "符合即時扣款三要件。請依核定時間或重新請款時間，參考批次扣款的時間（12:00 、 15:30 ，或隔日中午12:00）。請務必提醒保戶確認帳戶餘額充足。" },
                MANUAL_DAILY: { title: "一般流程 (每日扣款)", badge: "2個工作日銀行回傳", color: "text-blue-500", icon: "calendar", desc: "該行庫為每日扣款，發動請款後需 2 個工作天等待銀行回傳扣款結果，當日扣款完成後即可在NAP上查看結果。" },
                MANUAL_NINTH: { title: "一般流程 (逢九扣款)", badge: "下次逢九回傳", color: "text-slate-400", icon: "history", desc: "該行庫為逢九扣款，將於最近的 9/19/29 日扣款，當日扣款完成後即可在NAP上查看結果。" },
                AUTO_INSTANT: { title: "系統自動再扣 (即時)", badge: "T+3個工作日銀行回傳", color: "text-indigo-600", icon: "zap", desc: "［T=扣款失敗日］由系統自動發動扣款，預計於三個工作天後的中午 12 點發動即時扣款，當日銀行將會回傳扣款結果，並可在NAP上查看最新進度。" },
                AUTO_DAILY: { title: "系統自動再扣 (每日)", badge: "T+5個工作日銀行回傳", color: "text-blue-600", icon: "calendar", desc: "［T=扣款失敗日］由系統自動發動扣款，預計將於三個工作天後發動請款，發動後需2個工作天等待銀行回傳扣款結果，總時長約五個工作天。" },
                AUTO_NINTH: { title: "系統自動再扣 (逢九)", badge: "等待下次逢九作業", color: "text-slate-500", icon: "history", desc: "由系統自動發動扣款，預計將於扣款失敗日後加三個工作天發動請款，並在發動日的最近一次逢九完成扣款作業。" }
            };

            const updateParams = (key, value) => { setParams(prev => ({ ...prev, [key]: value })); };
            const handleNavigate = (next, action) => { if (action) action(); setHistory([...history, currentStep]); setCurrentStep(next); setSearchTerm(''); };
            const goBack = () => { const prev = history.pop(); setHistory([...history]); setCurrentStep(prev || 'HOME'); };
            const reset = () => { setHistory([]); setCurrentStep('HOME'); setParams({ currency: '', auth: '', isAuto: false }); };

            const filteredBanks = useMemo(() => {
                let base = BANK_DATABASE;
                if (params.currency === 'FOREIGN') {
                    base = base.filter(b => !['048', '081', '101', '103', '147', '823', '700', 'ACH'].includes(b.code));
                }
                const term = searchTerm.toLowerCase();
                return term ? base.filter(b => b.code.includes(term) || b.name.includes(term)).slice(0, 12) : base.slice(0, 10);
            }, [searchTerm, params.currency]);

            const selectBank = (bank) => {
                let finalType = 'NINTH'; 
                if (params.currency === 'TWD') {
                    if (params.auth === 'EDDA' && bank.isInstant) finalType = 'INSTANT';
                    else if (bank.twdDaily) finalType = 'DAILY';
                } else if (bank.foreignDaily) finalType = 'DAILY';
                setCurrentStep(params.isAuto ? `AUTO_${finalType}` : `MANUAL_${finalType}`);
                setHistory([...history, currentStep]);
            };

            const stepData = STEPS[currentStep];
            const resultData = RESULTS[currentStep];

            return (
                <div className="app-shell flex flex-col">
                    <header className="bg-slate-900 px-8 py-5 sticky top-0 z-40 shadow-lg flex items-center justify-between border-b border-white/10">
                        <div className="flex items-center gap-5">
                            {currentStep !== 'HOME' ? (
                                <button onClick={goBack} className="p-2 bg-white/10 hover:bg-white/20 rounded-xl transition-all text-white btn-active">
                                    <SvgIcon name="arrowLeft" color="white" className="w-5 h-5" />
                                </button>
                            ) : (
                                <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl">
                                    <SvgIcon name="zap" color="white" className="w-6 h-6" />
                                </div>
                            )}
                            <div className="flex flex-col">
                                <h1 className="font-bold text-white tracking-tight text-base md:text-lg leading-tight">新契約請款智慧助手</h1>
                                <div className="flex items-center gap-1.5 mt-0.5">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                                    <span className="text-[10px] font-medium text-slate-400 uppercase tracking-widest leading-none">發動請款時間預估</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={reset} className="flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 bg-white/5 text-white/70 hover:text-white hover:bg-white/10 rounded-lg transition-all btn-active">
                            <SvgIcon name="home" className="w-3.5 h-3.5" color="currentColor" />
                            <span className="text-[9px] font-black tracking-tighter uppercase">返回首頁</span>
                        </button>
                    </header>

                    {stepData && currentStep !== 'HOME' && (
                        <div className="bg-slate-50 border-b border-slate-200 px-8 py-3.5 flex items-center justify-between gap-6">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 force-nowrap">
                                <SvgIcon name="layers" className="w-3 h-3 opacity-30"/> {stepData.id}
                            </span>
                            <div className="flex-1 h-1 bg-slate-200 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-600 transition-all duration-700" style={{width: `${(history.length / 6) * 100}%`}}></div>
                            </div>
                        </div>
                    )}

                    <main className="flex-grow p-8 md:p-12 animate-up flex flex-col no-scrollbar overflow-y-auto">
                        {stepData ? (
                            <div className="flex flex-col">
                                <h2 className="text-lg md:text-xl font-black text-slate-800 mb-8 tracking-tight force-nowrap">
                                    {stepData.question}
                                </h2>
                                <div className="space-y-3.5">
                                    {stepData.options.map((opt, idx) => (
                                        <button key={idx} onClick={() => handleNavigate(opt.next, opt.action)} className="w-full group flex items-center p-5 bg-white border border-slate-200 rounded-[1.25rem] hover:border-indigo-600 hover:bg-indigo-50/30 transition-all btn-active shadow-sm text-left overflow-visible">
                                            <div className={`mr-4 p-2.5 rounded-xl transition-colors shadow-sm ${opt.color} text-white shrink-0`}>
                                                <SvgIcon name={opt.icon} color="white" className="w-3.5 h-3.5" />
                                            </div>
                                            <span className={`flex-1 font-bold text-[14px] md:text-base force-nowrap ${opt.color.replace('bg-', 'text-')}`}>
                                                {opt.label}
                                            </span>
                                            <SvgIcon name="chevronRight" className="w-4 h-4 text-slate-300 group-hover:text-indigo-600 transition-all shrink-0 ml-4" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : currentStep === 'BANK_SEARCH' ? (
                            <div className="flex flex-col animate-up">
                                <h2 className="text-lg md:text-xl font-black text-slate-800 mb-2 tracking-tight">請搜尋扣款行庫</h2>
                                <p className="text-sm text-slate-400 mb-8">幣別：{params.currency === 'TWD' ? '台幣' : '外幣'} ｜ 請直接輸入銀行代碼 (如 007) 或 名稱搜尋</p>
                                <div className="relative mb-6">
                                    <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                                        <SvgIcon name="search" className="w-5 h-5 text-slate-300" />
                                    </div>
                                    <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder="搜尋行庫代碼或名稱" className="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-lg focus:border-indigo-500 transition-all"/>
                                </div>
                                <div className="space-y-2 max-h-[300px] overflow-y-auto no-scrollbar pr-2">
                                    {filteredBanks.map(b => (
                                        <button key={b.code} onClick={() => selectBank(b)} className="w-full flex items-center justify-between p-4 bg-white border border-slate-100 rounded-xl hover:bg-indigo-50 hover:border-indigo-200 transition-all btn-active group">
                                            <div className="flex items-center gap-4">
                                                <span className="bg-slate-100 px-2.5 py-1 rounded-md text-[11px] font-black text-slate-500 group-hover:bg-white">{b.code}</span>
                                                <span className="font-bold text-slate-700">{b.name}</span>
                                            </div>
                                            <div className="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                <span className="text-[10px] font-black text-indigo-600">選擇此行庫</span>
                                                <SvgIcon name="chevronRight" className="w-3.5 h-3.5 text-indigo-600" />
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : resultData ? (
                            <div className="flex flex-col items-center text-center">
                                <div className="mb-10 p-12 bg-slate-50 rounded-[4rem] shadow-inner relative ring-1 ring-slate-100">
                                    <SvgIcon name={resultData.icon} className={`w-20 h-20 ${resultData.color}`} color="currentColor" />
                                    <div className="absolute -bottom-6 left-1/2 -translate-x-1/2 px-10 py-4 bg-slate-900 rounded-full shadow-2xl border-4 border-white z-10">
                                        <p className="text-[12px] font-black text-white tracking-wide force-nowrap leading-none">{resultData.badge}</p>
                                    </div>
                                </div>
                                <h2 className="text-2xl font-black text-slate-900 mb-6">{resultData.title}</h2>
                                <div className="bg-indigo-50 border border-indigo-100 p-8 md:p-10 rounded-[2.5rem] text-left shadow-sm mb-10 w-full">
                                    <p className="text-lg font-bold text-slate-700 leading-relaxed italic">{resultData.desc}</p>
                                </div>
                                <button onClick={reset} className="w-full max-w-sm bg-slate-900 text-white py-6 rounded-2xl font-black text-lg hover:bg-black transition-all shadow-xl btn-active flex items-center justify-center gap-3">
                                    <SvgIcon name="success" className="w-5 h-5" color="white"/> 重新診斷另一筆案件
                                </button>
                            </div>
                        ) : null}

                        {/* --- 常見問題欄位 (Accordion) --- */}
                        <div className="mt-16 border-t border-slate-100 pt-10">
                            <div className="flex items-center gap-2 mb-6">
                                <SvgIcon name="help" className="w-5 h-5 text-indigo-600" />
                                <h3 className="text-lg font-black text-slate-800">常見問題 FAQ</h3>
                            </div>
                            <div className="space-y-3">
                                {[
                                    {
                                        q: "為什麼 NAP / 進度查詢，沒有「重新請款」的按鈕？",
                                        a: (
                                            <ul className="list-decimal pl-5 space-y-1">
                                                <li>確認請款事由：</li>
                                                <li>1.請款事由為受理請款，無法申請重新請款。</li>
                                                <li>2.請款事由為核保請款，第一次扣款會由系統自動發動，故無按鈕，無需手動申請重新請款。</li>
                                            </ul>
                                        )
                                    },
                                    {
                                        q: "授權管道為信用卡，扣款失敗後什麼時候會再扣款？",
                                        a: (
                                            <div>
                                                <p className="font-bold text-indigo-700">大原則：發動請款後，隔日銀行回傳結果。</p>
                                                <p className="text-slate-500 mt-1">註：若核保請款失敗，需待次ㄧ工作日，才能點選重新請款。</p>
                                            </div>
                                        )
                                    }
                                ].map((item, idx) => (
                                    <div key={idx} className="bg-slate-50 rounded-2xl overflow-hidden border border-slate-100">
                                        <button 
                                            onClick={() => setExpandedFaq(expandedFaq === idx ? null : idx)}
                                            className="w-full px-6 py-4 flex items-center justify-between text-left hover:bg-slate-100 transition-colors"
                                        >
                                            <span className="font-bold text-slate-700 text-sm">{item.q}</span>
                                            <SvgIcon 
                                                name="chevronDown" 
                                                className={`w-4 h-4 text-slate-400 transition-transform ${expandedFaq === idx ? 'rotate-180' : ''}`} 
                                            />
                                        </button>
                                        {expandedFaq === idx && (
                                            <div className="px-6 pb-5 text-sm text-slate-600 leading-relaxed animate-up">
                                                <div className="bg-white p-4 rounded-xl border border-slate-200">
                                                    {item.a}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    <footer className="mt-auto border-t border-slate-100 bg-slate-50/50 p-8 pb-10">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                <div className="flex items-center gap-2 mb-3">
                                    <SvgIcon name="clock" className="w-4 h-4" color="#94a3b8"/>
                                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-tighter leading-none">即時扣款回傳批次</p>
                                </div>
                                <div className="space-y-3 text-[13px] font-bold text-slate-600">
                                    <div className="flex justify-between border-b border-slate-50 pb-1"><span>12:00 前完成操作</span><span className="text-indigo-600 font-black">中午回傳</span></div>
                                    <div className="flex justify-between border-b border-slate-50 pb-1"><span>15:30 前完成操作</span><span className="text-indigo-600 font-black">下午回傳</span></div>
                                    <div className="flex justify-between"><span>15:30 後完成操作</span><span className="text-indigo-600 font-black">隔日中午</span></div>
                                </div>
                            </div>
                            <div className="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 shadow-inner text-left">
                                <div className="flex items-center gap-2 mb-3">
                                    <SvgIcon name="success" className="w-4 h-4" color="#6366f1"/>
                                    <p className="text-[10px] font-black text-indigo-500 uppercase tracking-tighter leading-none">即時扣款三要件</p>
                                </div>
                                <div className="space-y-2 text-[12px] font-bold text-indigo-700/80 leading-none">
                                    <div className="flex items-center gap-2 force-nowrap"><SvgIcon name="success" className="w-3.5 h-3.5" color="#818cf8"/> 台幣核保請款</div>
                                    <div className="flex items-center gap-2 force-nowrap"><SvgIcon name="success" className="w-3.5 h-3.5" color="#818cf8"/> 26 家適用行庫</div>
                                    <div className="flex items-center gap-2 force-nowrap"><SvgIcon name="success" className="w-3.5 h-3.5" color="#818cf8"/> 電子授權（eDDA/網銀雙因）</div>
                                </div>
                            </div>
                        </div>
                        <p className="mt-8 text-[11px] font-black text-slate-300 tracking-[0.4em] uppercase text-center flex items-center justify-center gap-2">
                            <SvgIcon name="landmark" className="w-3.5 h-3.5 opacity-30" /> 作業版本 v46.0
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
