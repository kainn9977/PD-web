<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新契約請款時效助手</title>
    <!-- 基礎佈局：Tailwind CSS + React + Babel -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* 寬版旗艦風格：寬度 900px，頂部對齊自然排列 */
        .app-shell {
            width: 100%;
            max-width: 900px; 
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* 全域強制不換行指令 */
        .force-nowrap {
            white-space: nowrap !important;
            word-break: keep-all !important;
            overflow: visible !important;
        }

        .animate-up {
            animation: slideUp 0.35s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-active:active { transform: scale(0.99); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 全內嵌 SVG 組件：縮小尺寸，防止擠壓文字 ---
        const SvgIcon = ({ name, className = "w-3.5 h-3.5", color = "currentColor" }) => {
            const paths = {
                home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />,
                landmark: <><path d="M3 22h18" /><path d="M6 18v-7" /><path d="M11 18v-7" /><path d="M16 18v-7" /><path d="M3 11l9-8 9 8" /><path d="M5 11h14" /></>,
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>,
                history: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></>,
                timer: <><line x1="10" y1="2" x2="14" y2="2" /><line x1="12" y1="14" x2="15" y2="11" /><circle cx="12" cy="14" r="8" /></>,
                fileCheck: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><path d="m9 15 2 2 4-4" /></>,
                calculator: <rect x="4" y="2" width="16" height="20" rx="2" />,
                arrowLeft: <path d="M19 12H5M12 19l-7-7 7-7" />,
                chevronRight: <path d="M9 18l6-6-6-6" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                check: <polyline points="20 6 9 17 4 12" />,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /></>,
                success: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                warning: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    {paths[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentStep, setCurrentStep] = useState('HOME');
            const [history, setHistory] = useState([]);

            const STEPS = {
                HOME: {
                    id: "診斷起始",
                    question: "請選擇您的案件目前請款事由：",
                    options: [
                        { label: "受理請款「請款失敗」", next: "ACC_CHECK", color: "bg-blue-600", icon: "landmark" },
                        { label: "核保請款「請款失敗」", next: "UW_DECISION", color: "bg-indigo-600", icon: "zap" }
                    ]
                },
                ACC_CHECK: {
                    id: "核定狀態",
                    question: "查詢系統：這件保單核定完成了嗎？",
                    options: [
                        { label: "保單已核定完成", next: "ACC_DATE", color: "bg-blue-600", icon: "fileCheck" },
                        { label: "保單目前尚未核定", next: "RES_ACC_WAIT", color: "bg-slate-500", icon: "clock" }
                    ]
                },
                ACC_DATE: {
                    id: "日期判定",
                    question: "請比對系統中的核定與失敗日期：",
                    options: [
                        { label: "核定日期 > 請款失敗日期", next: "MODE_ACC_IMMEDIATE", color: "bg-emerald-600", icon: "calendar" },
                        { label: "核定日期 <= 請款失敗日期", next: "RES_ACC_T3", color: "bg-amber-600", icon: "history" }
                    ]
                },
                UW_DECISION: {
                    id: "處理行為",
                    question: "業務員現在要手動申請重新請款嗎？",
                    options: [
                        { label: "立即點選「重新請款」按鈕", next: "MODE_UW_MANUAL", color: "bg-indigo-600", icon: "zap" },
                        { label: "依系統作業時間自動發動請款", next: "MODE_UW_AUTO", color: "bg-slate-500", icon: "timer" }
                    ]
                },
                MODE_ACC_IMMEDIATE: { id: "模式判定", question: "這件符合即時扣款的三項要件嗎？", options: [{ label: "符合即時扣款條件", next: "TIME_PICK_ACC", color: "bg-emerald-600", icon: "zap" }, { label: "一般扣款流程", next: "RES_GEN_T2", color: "bg-slate-600", icon: "landmark" }] },
                MODE_UW_MANUAL: { id: "模式判定", question: "這件符合即時扣款三項要件嗎？", options: [{ label: "符合即時扣款條件", next: "TIME_PICK_UW", color: "bg-emerald-600", icon: "zap" }, { label: "一般扣款流程", next: "RES_GEN_T2", color: "bg-slate-600", icon: "landmark" }] },
                MODE_UW_AUTO: { id: "模式判定", question: "這件符合即時扣款三項要件嗎？", options: [{ label: "符合即時扣款條件", next: "RES_AUTO_T3_INSTANT", color: "bg-emerald-600", icon: "zap" }, { label: "一般扣款流程", next: "RES_AUTO_T3_GENERAL", color: "bg-slate-600", icon: "landmark" }] },
                
                TIME_PICK_ACC: {
                    id: "批次時間",
                    question: "審查部「壓核定」的時間點？",
                    options: [
                        { label: "中午 12:00 之前完成操作", next: "RES_INST_1200", color: "bg-teal-600", icon: "timer" },
                        { label: "下午 15:30 之前完成操作", next: "RES_INST_1530", color: "bg-teal-600", icon: "timer" },
                        { label: "下午 15:30 之後完成操作", next: "RES_INST_NEXT", color: "bg-slate-500", icon: "timer" }
                    ]
                },
                TIME_PICK_UW: {
                    id: "批次時間",
                    question: "您「點擊重新請款」的時間點？",
                    options: [
                        { label: "中午 12:00 之前操作", next: "RES_INST_1200", color: "bg-teal-600", icon: "timer" },
                        { label: "下午 15:30 之前操作", next: "RES_INST_1530", color: "bg-teal-600", icon: "timer" },
                        { label: "下午 15:30 之後操作", next: "RES_INST_NEXT", color: "bg-slate-500", icon: "timer" }
                    ]
                }
            };

            const RESULTS = {
                RES_ACC_WAIT: {
                    title: "等待核定中", badge: "進度暫停中",
                    desc: "保單目前尚未完成核定。請在核定完成後重新使用本診斷助手，屆時將自動轉換為核保請款時效。",
                    icon: "warning", color: "text-orange-500"
                },
                RES_ACC_T3: {
                    title: "系統作業等待中", badge: "T+3個工作日發動",
                    desc: "由於剛扣款失敗，系統將保留作業緩衝時間。預計於受理請款失敗日後第 3 個工作天自動發動。若需提前扣款，請聯繫審查部重新壓核定。",
                    icon: "clock", color: "text-amber-500"
                },
                RES_GEN_T2: {
                    title: "一般請款時效預估", badge: "2工作日銀行回傳",
                    desc: "本案採一般流程發動。發動後需等待 2 個工作天處理資料，也就是 2 個工作天後即可在系統查看最終結果。",
                    icon: "landmark", color: "text-slate-500"
                },
                RES_INST_1200: {
                    title: "即時扣款預估結果", badge: "今日 12:00 銀行回傳",
                    desc: "符合即時扣款條件。預計於今日中午 12:00 銀行就會回傳結果，請提醒客戶確認帳戶餘額是否充足。",
                    icon: "success", color: "text-emerald-500"
                },
                RES_INST_1530: {
                    title: "即時扣款預估結果", badge: "今日 15:30 銀行回傳",
                    desc: "符合即時扣款條件。預計於今日下午 15:30 銀行就會回傳結果，請提醒客戶確認帳戶餘額是否充足。",
                    icon: "success", color: "text-emerald-500"
                },
                RES_INST_NEXT: {
                    title: "即時扣款預估結果", badge: "次日 12:00 銀行回傳",
                    desc: "因已過今日批次，系統排定於下一工作日中午 12:00 由銀行回傳最終結果。",
                    icon: "clock", color: "text-teal-600"
                },
                RES_AUTO_T3_INSTANT: {
                    title: "自動再扣時效", badge: "T+3個工作日銀行回傳",
                    desc: "【T=扣款失敗日】由系統自動發動扣款，預計於 3 個工作天後的中午 12:00 發動即時扣款，當日銀行即會回傳結果。",
                    icon: "zap", color: "text-emerald-500"
                },
                RES_AUTO_T3_GENERAL: {
                    title: "自動再扣時效", badge: "T+5個工作日銀行回傳",
                    desc: "【T=扣款失敗日】由系統自動發動扣款，預計將於 3 個工作天後發動一般流程，發動後需再過 2 個工作天等待銀行回傳結果，總時效約 5 個工作天。",
                    icon: "landmark", color: "text-slate-400"
                }
            };

            const handleAction = (next) => { setHistory([...history, currentStep]); setCurrentStep(next); };
            const goBack = () => { const prev = history.pop(); setHistory([...history]); setCurrentStep(prev || 'HOME'); };
            const reset = () => { setHistory([]); setCurrentStep('HOME'); };

            const stepData = STEPS[currentStep];
            const resultData = RESULTS[currentStep];

            return (
                <div className="app-shell flex flex-col">
                    
                    {/* Header: 縮小字體與垂直膠囊式 Home 按鈕 */}
                    <header className="bg-slate-900 px-8 py-5 sticky top-0 z-40 shadow-lg flex items-center justify-between">
                        <div className="flex items-center gap-5">
                            {currentStep !== 'HOME' ? (
                                <button onClick={goBack} className="p-2 bg-white/10 hover:bg-white/20 rounded-xl transition-all text-white btn-active">
                                    <SvgIcon name="arrowLeft" color="white" className="w-5 h-5" />
                                </button>
                            ) : (
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-xl">
                                    <SvgIcon name="calculator" color="white" className="w-6 h-6" />
                                </div>
                            )}
                            <div className="flex flex-col">
                                <h1 className="font-bold text-white tracking-tight text-base md:text-lg">新契約請款時效助手</h1>
                                <div className="flex items-center gap-1.5">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                                    <span className="text-[10px] font-medium text-slate-400 uppercase tracking-widest leading-none">發動扣款時間預估</span>
                                </div>
                            </div>
                        </div>
                        
                        {/* 右上角：極微縮垂直式返回按鈕 */}
                        <button 
                            onClick={reset} 
                            className="flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 bg-white/5 text-white/70 hover:text-white hover:bg-white/10 rounded-lg transition-all btn-active"
                        >
                            <SvgIcon name="home" className="w-3.5 h-3.5" color="currentColor" />
                            <span className="text-[9px] font-black tracking-tighter">返回首頁</span>
                        </button>
                    </header>

                    {/* Progress indicator */}
                    {stepData && currentStep !== 'HOME' && (
                        <div className="bg-slate-50 border-b border-slate-200 px-8 py-2.5 flex items-center justify-between gap-6">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 force-nowrap">
                                <SvgIcon name="layers" className="w-3 h-3 opacity-30"/> {stepData.id}
                            </span>
                            <div className="flex-1 h-1 bg-slate-200 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-600 transition-all duration-700" style={{width: `${(history.length / 5) * 100}%`}}></div>
                            </div>
                        </div>
                    )}

                    {/* Main Body: 優化問句與按鈕文字 */}
                    <main className="flex-grow p-8 md:p-12 animate-up flex flex-col no-scrollbar">
                        {stepData ? (
                            <div className="flex flex-col">
                                {/* 問句字體輕量化 */}
                                <h2 className="text-lg md:text-xl font-black text-slate-800 mb-8 tracking-tight force-nowrap">
                                    {stepData.question}
                                </h2>
                                <div className="space-y-3.5">
                                    {stepData.options.map((opt, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => handleAction(opt.next)}
                                            className="w-full group flex items-center p-5 bg-white border border-slate-200 rounded-[1.25rem] hover:border-indigo-600 hover:bg-indigo-50/30 transition-all btn-active shadow-sm text-left overflow-visible"
                                        >
                                            {/* 圖示微縮為 w-3.5 徹底防止擠壓 */}
                                            <div className={`mr-4 p-2.5 rounded-xl transition-colors shadow-sm ${opt.color} text-white shrink-0`}>
                                                <SvgIcon name={opt.icon} color="white" className="w-3.5 h-3.5" />
                                            </div>
                                            {/* 字體 14px 並確保單行 */}
                                            <span className={`flex-1 font-bold text-[14px] md:text-base force-nowrap ${opt.color.replace('bg-', 'text-')}`}>
                                                {opt.label}
                                            </span>
                                            <SvgIcon name="chevronRight" className="w-4 h-4 text-slate-300 group-hover:text-indigo-600 transition-all shrink-0 ml-4" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : resultData ? (
                            <div className="flex flex-col items-center text-center">
                                <div className="mb-10 p-10 bg-slate-50 rounded-[3.5rem] shadow-inner relative ring-1 ring-slate-100">
                                    {/* 修復結果頁面圖示不見的問題 */}
                                    <SvgIcon name={resultData.icon} className={`w-16 h-16 ${resultData.color}`} color="currentColor" />
                                    {/* 結論 Badge */}
                                    <div className="absolute -bottom-5 left-1/2 -translate-x-1/2 px-8 py-3.5 bg-slate-900 rounded-full shadow-2xl border-4 border-white z-10">
                                        <p className="text-[12px] font-black text-white tracking-wide force-nowrap leading-none">
                                            {resultData.badge}
                                        </p>
                                    </div>
                                </div>
                                
                                <h2 className="text-2xl font-black text-slate-900 mb-6">{resultData.title}</h2>
                                
                                <div className="bg-indigo-50 border border-indigo-100 p-8 md:p-10 rounded-[2.5rem] text-left shadow-sm mb-10 w-full">
                                    <p className="text-[17px] font-bold text-slate-700 leading-relaxed italic">
                                        {resultData.desc}
                                    </p>
                                </div>

                                <button 
                                    onClick={reset} 
                                    className="w-full max-w-sm bg-slate-900 text-white py-6 rounded-2xl font-black text-lg hover:bg-black transition-all shadow-xl btn-active flex items-center justify-center gap-3"
                                >
                                    <SvgIcon name="home" className="w-5 h-5" color="white"/> 診斷其他案件
                                </button>
                            </div>
                        ) : null}
                    </main>

                    {/* Footer wall */}
                    <footer className="mt-auto border-t border-slate-100 bg-slate-50/50 p-8 pb-10">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                <div className="flex items-center gap-2 mb-3">
                                    <SvgIcon name="timer" className="w-4 h-4" color="#94a3b8"/>
                                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-tighter leading-none">即時扣款回傳批次</p>
                                </div>
                                <div className="space-y-2.5 text-[13px] font-bold text-slate-600">
                                    <div className="flex justify-between border-b border-slate-50 pb-1"><span>12:00 前完成操作</span><span className="text-indigo-600 font-black">中午</span></div>
                                    <div className="flex justify-between border-b border-slate-50 pb-1"><span>15:30 前完成操作</span><span className="text-indigo-600 font-black">下午</span></div>
                                </div>
                            </div>
                            <div className="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 shadow-inner text-left">
                                <div className="flex items-center gap-2 mb-3">
                                    <SvgIcon name="shield" className="w-4 h-4" color="#6366f1"/>
                                    <p className="text-[10px] font-black text-indigo-500 uppercase tracking-tighter leading-none">即時扣款三要件</p>
                                </div>
                                <div className="space-y-2 text-[12px] font-bold text-indigo-700/80 leading-none">
                                    <div className="flex items-center gap-2"><SvgIcon name="check" className="w-3 h-3" color="#818cf8"/> 台幣案件專屬</div>
                                    <div className="flex items-center gap-2"><SvgIcon name="check" className="w-3 h-3" color="#818cf8"/> 26 家適用行庫</div>
                                    <div className="flex items-center gap-2"><SvgIcon name="check" className="w-3 h-3" color="#818cf8"/> eDDA/網銀雙因</div>
                                </div>
                            </div>
                        </div>
                        <p className="mt-8 text-[11px] font-black text-slate-300 tracking-[0.4em] uppercase text-center flex items-center justify-center gap-2">
                            <SvgIcon name="landmark" className="w-3.5 h-3.5 opacity-30" /> 作業版本 v40.0
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
